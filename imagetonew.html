<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI IMAGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: rgba(28, 28, 30, 0.7);
            --primary: #FFD700;
            --text: #ffffff;
            --blur: blur(30px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 40px 20px 120px;
            box-sizing: border-box;
        }

        /* Title Area No Logo */
        .header-title {
            text-align: left;
            margin-bottom: 30px;
        }

        .header-title h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .header-title span {
            color: var(--primary);
        }

        /* Main Preview Card */
        .main-card {
            background: var(--card);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: 35px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .preview-box {
            width: 100%;
            height: 350px;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #imgPreview { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Loader */
        .loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,215,0,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Multi Buttons Grid */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 15px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:active { background: var(--primary); color: #000; }
        .btn-action.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .btn-main {
            grid-column: span 2;
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* History Bar */
        .history-section {
            margin-top: 30px;
        }

        .history-label {
            font-size: 12px;
            font-weight: 800;
            opacity: 0.4;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .history-bar {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .history-bar::-webkit-scrollbar { display: none; }

        .history-item {
            min-width: 80px;
            height: 80px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            flex-shrink: 0;
        }

        .history-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Dock */
        .dock {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: var(--blur);
            padding: 15px;
            border-radius: 28px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .dock-link { text-decoration: none; color: #fff; font-size: 11px; font-weight: 800; opacity: 0.5; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-title" data-aos="fade-down">
        <p style="margin:0; font-size: 12px; font-weight: 800; opacity: 0.4; letter-spacing: 2px;">AI IMAGE</p>
        <h1>STUDIO<span>.</span></h1>
    </div>

    <div class="main-card" data-aos="zoom-in">
        <div class="preview-box">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
                <p style="margin-top:15px; font-size:12px; font-weight:800;">PROCESSING...</p>
            </div>
            <p id="placeholder" style="opacity:0.2; font-weight:800;">SELECT SOURCE</p>
            <img id="imgPreview">
        </div>

        <div class="action-grid">
            <button class="btn-action" data-prompt="ubahkan kulit nya menjadi hitam">HITAM</button>
            <button class="btn-action" data-prompt="ubahkan foto tersebut menjadi anime style">ANIME</button>
            <button class="btn-action" data-prompt="ubahkan foto tersebut menjadi hijab">HIJAB</button>
            <button class="btn-action" data-prompt="ubahkan foto tersebut menjadi mini figure">FIGURE</button>
            
            <input type="file" id="fileInput" accept="image/*">
            <button class="btn-main" id="uploadBtn">SELECT PHOTO</button>
        </div>
    </div>

    <div class="history-section" data-aos="fade-up">
        <span class="history-label">Recent History</span>
        <div class="history-bar" id="historyBar">
            </div>
    </div>
</div>

<div class="dock">
    <a href="https://wa.me/6281381134418" class="dock-link">WA</a>
    <a href="https://t.me/imbussy" class="dock-link">TG</a>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    const IMGBB_KEY = '6296198268b47de9e17fe745d833d8ef';
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const imgPreview = document.getElementById('imgPreview');
    const loader = document.getElementById('loader');
    const historyBar = document.getElementById('historyBar');

    let currentPhotoFile = null;

    uploadBtn.onclick = () => fileInput.click();

    fileInput.onchange = function() {
        const file = this.files[0];
        if (file) {
            currentPhotoFile = file;
            imgPreview.src = URL.createObjectURL(file);
            imgPreview.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
        }
    };

    // Logika Tombol Mode
    document.querySelectorAll('.btn-action').forEach(btn => {
        btn.onclick = async function() {
            if (!currentPhotoFile) return alert("Pilih foto dulu!");
            
            const promptText = this.getAttribute('data-prompt');
            startTransform(promptText);
        };
    });

    async function startTransform(prompt) {
        loader.style.display = 'flex';
        
        try {
            // 1. Upload ke ImgBB
            const formData = new FormData();
            formData.append('image', currentPhotoFile);
            const upRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: 'POST',
                body: formData
            });
            const upData = await upRes.json();
            const sourceUrl = upData.data.url;

            // 2. Kirim ke API Nano Banana (Ikyyxd)
            const apiRes = await fetch(`https://api.ikyyxd.my.id/edit/nanobananav3?prompt=${encodeURIComponent(prompt)}&url=${encodeURIComponent(sourceUrl)}`);
            const apiData = await apiRes.json();

            if (apiData.status) {
                const resultUrl = apiData.result.result_url;
                imgPreview.src = resultUrl;
                saveToHistory(resultUrl);
            }
        } catch (e) {
            alert("API Error");
        } finally {
            loader.style.display = 'none';
        }
    }

    function saveToHistory(url) {
        let history = JSON.parse(localStorage.getItem('ai_history') || '[]');
        history.unshift(url);
        localStorage.setItem('ai_history', JSON.stringify(history.slice(0, 10)));
        renderHistory();
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('ai_history') || '[]');
        historyBar.innerHTML = history.map(url => `
            <div class="history-item" onclick="window.open('${url}')">
                <img src="${url}">
            </div>
        `).join('');
    }

    window.onload = renderHistory;
</script>

</body>
</html>
